<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question</title>
    <style>
        body {
            background-image: url(https://preview.redd.it/how-would-lains-room-look-like-with-todays-technology-v0-2fj6i18hpzm81.jpg?width=1080&crop=smart&auto=webp&s=5f9c787a80b7daea5e7469ede4494f2c6b133f55);
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: Gothic, sans-serif;
        }
        .con {
            margin: 150px auto;
            /* background: rgba(255, 255, 255, 0.1); */
            backdrop-filter: blur(10px);
            align-items: center;
            text-align: center;
            width: 70%;
            border-radius: 15px;
            padding-bottom:10px;
        }
        .sub {
            border: solid 1px white;
            border-radius: 15px;
            width: 50%;
            margin: 1% auto;
            padding: 1%;
            text-align:left;
            color: white;
            
        }
        .sub:hover{
            background: rgba(0, 0, 0, 0.3);
            color: white;
            cursor: pointer;
            transform: scale(1.03);
            transition: 0.3s;   
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
        }
        .avatar {
            margin: 25%;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
        }
        .bubble {
            width: 70%;
            font-size: 1.8em;
            color: white;
            padding:10px;
            font-weight:bold;
        }
        .subcon {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5%;
            
        }
        .header {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 15px 15px 0px 0px;
        }
        .Next {
            display: none;
            text-align: center;        
            opacity: 0;
            transition: 0.5s;
            cursor: pointer;
            background: transparent;
            border: solid 1px white;
            border-radius: 15px;
            width: 20%;
            margin: 1% auto;
            padding: 1%;
            color: white;
            text-align: center;
            margin-top: 3%;
        }
        .Next:hover{
            background: rgba(0, 0, 0, 0.3);
            color: white;
            cursor: pointer;
            transform: scale(1.02);
            transition: 0.3s;   
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="con">
        <div class="header">
            <div><img src="https://i.pinimg.com/originals/8f/c9/69/8fc969bacc4ccce997830e75773f7cf4.jpg" alt="lain" class="avatar"></div>
            <div class="bubble">Question</div>
        </div>
        <div class="subcon">
            <div class="sub">A:</div>
            <div class="sub">B:</div>
            <div class="sub">C:</div>
            <div class="sub">D:</div>
            <button class="Next">Next</button>
        </div>
        <div>
            
        </div>
    </div>
    

    <script src="subq.js"></script>
     <script>
        const params=new URLSearchParams(window.location.search);
        const subject=params.get("subject");
        let questions=qstn[subject];
        let current=0;
        let score=0;
        let answered=false;

        const qstnbox=document.querySelector('.bubble');
        const options=document.querySelectorAll('.sub');
        const nextbtn=document.querySelector('.Next');

        function loadquestion(){
            let q=questions[current];
            qstnbox.textContent=q.q;

            options.forEach((opt,index)=>{
                opt.textContent=q.options[index];
                opt.style.background="transparent";
                opt.style.pointerEvents="auto";
                
            });
            answered=false;

        }
        options.forEach((opt,index) =>{
            opt.addEventListener('click',() =>{
                /*options.forEach(o => o.style.background="rgba(0,0,0,0.4)");
                opt.style.background="green"

                nextbtn.style.display="block";
                nextbtn.style.opacity="1";*/

                if(answered) return;
                answered=true;

                options.forEach(o => o.style.pointerEvents ="none");

                if(index=== questions[current].ans){
                    opt.style.background="green";
                    score++;
                }
                else{
                    opt.style.background="red";
                    options[questions[current].ans].style.background="green";
                }

                
                nextbtn.style.display="block";
                nextbtn.style.opacity="1";
                

            });
        });
        nextbtn.addEventListener('click',()=>{
            current++;
            if(current<questions.length){
                loadquestion();
            }
            else{
                
            }
        });
        loadquestion();


    </script>
    
</body>
</html>
