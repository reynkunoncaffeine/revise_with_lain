<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question</title>
    <style>
        body {
            background-image: url(https://preview.redd.it/how-would-lains-room-look-like-with-todays-technology-v0-2fj6i18hpzm81.jpg?width=1080&crop=smart&auto=webp&s=5f9c787a80b7daea5e7469ede4494f2c6b133f55);
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: Gothic, sans-serif;
        }
        .con {
            margin: 150px auto;
            backdrop-filter: blur(10px);
            text-align: center;
            width: 70%;
            border-radius: 15px;
            padding-bottom: 10px;
        }
        .sub {
            border: solid 1px white;
            border-radius: 15px;
            width: 50%;
            margin: 1% auto;
            padding: 1%;
            text-align: left;
            color: white;
        }
        .sub:hover {
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transform: scale(1.03);
            transition: 0.3s;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
        }
        .avatar {
            margin: 25%;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
        }
        .bubble {
            width: 70%;
            font-size: 1.8em;
            color: white;
            padding: 10px;
            font-weight: bold;
        }
        .subcon {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5%;
        }
        .header {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 15px 15px 0 0;
            gap: 15px;
        }
        .Next {
            display: none;
            cursor: pointer;
            background: transparent;
            border: solid 1px white;
            border-radius: 15px;
            width: 20%;
            margin: 3% auto 1%;
            padding: 1%;
            color: white;
            text-align: center;
        }
        .Next:hover {
            background: rgba(0, 0, 0, 0.3);
            transform: scale(1.02);
            transition: 0.3s;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="con">
        <div class="header">
            <div>
                <img src="https://i.pinimg.com/originals/8f/c9/69/8fc969bacc4ccce997830e75773f7cf4.jpg"
                     alt="lain" class="avatar">
            </div>
            <div class="bubble" id="questionText">loading</div>
        </div>
        <div class="subcon">
            <div class="sub" id="opt0"></div>
            <div class="sub" id="opt1"></div>
            <div class="sub" id="opt2"></div>
            <div class="sub" id="opt3"></div>
            <button class="Next" id="nextBtn">Next</button>
        </div>
    </div>

    <script>
        const subject = new URLSearchParams(window.location.search).get("subject");
        const questionText = document.getElementById("questionText");
        const opts  = [0,1,2,3].map(i => document.getElementById("opt" + i));
        const nextBtn = document.getElementById("nextBtn");

        let answered = false;
        let finished = false;
        let currentCorrect = -1;

        
        function parseServletHTML(html) {
            const doc = new DOMParser().parseFromString(html, "text/html");
            const h2s = doc.querySelectorAll("h2");
            const labels = doc.querySelectorAll("label");

            if (labels.length === 0) {
                
                return {
                    done:      true,
                    scoreText: Array.from(h2s).map(h => h.textContent.trim()).join("  ")
                };
            }

            return {
                done:     false,
                counter:  h2s[0]?.textContent.trim() ?? "",
                question: h2s[1]?.textContent.trim() ?? "",
                options:  Array.from(labels).map(l => l.textContent.trim()),
                correct:  parseInt(doc.getElementById("correctAns")?.textContent ?? "-1")
            };
        }

        
        function showQuestion(data) {
            currentCorrect = data.correct;
            questionText.textContent = data.counter + "  : " + data.question;
            opts.forEach((o, i) => {
                o.textContent  = data.options[i] ?? "";
                o.style.background  = "transparent";
                o.style.pointerEvents = "auto";
                o.style.display  = "block";
            });
            nextBtn.style.display = "none";
            nextBtn.onclick       = null;
            answered = false;
        }

        
        function showScore(scoreText) {
            finished = true;
            questionText.textContent = scoreText;
            opts.forEach(o => o.style.display = "none");
            nextBtn.textContent   = "Home";
            nextBtn.style.display = "block";
            nextBtn.onclick   = () => window.location.href = "index.html";
        }

        
        opts.forEach((opt, index) => {
            opt.addEventListener("click", async () => {
                if (answered || finished) return;
                answered = true;

                opts.forEach(o => o.style.pointerEvents = "none");

                
                opts.forEach((o, i) => {
                    if (i === currentCorrect) o.style.background = "#256b25";
                    else if (i === index)     o.style.background = "#7d0a0a";
                });

                
                const res  = await fetch("QuizServlet", {
                    method:      "POST",
                    credentials: "same-origin",
                    headers:   { "Content-Type": "application/x-www-form-urlencoded" },
                    body:     new URLSearchParams({ ans: index })
                });
                const next = parseServletHTML(await res.text());

                nextBtn.style.display = "block";
                nextBtn.textContent   = "Next";
                nextBtn.onclick     = () => {
                    if (next.done) showScore(next.scoreText);
                    else          showQuestion(next);
                };
            });
        });

        
        (async () => {
            const res  = await fetch("QuizServlet?subject=" + encodeURIComponent(subject),
                                     { credentials: "same-origin" });
            const data = parseServletHTML(await res.text());
            if (data.done) showScore(data.scoreText);
            else           showQuestion(data);
        })();
    </script>
</body>
</html>
