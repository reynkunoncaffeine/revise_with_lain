<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Revise With Lain</title>
    <style>
        body {
            background-image: url(https://preview.redd.it/how-would-lains-room-look-like-with-todays-technology-v0-2fj6i18hpzm81.jpg?width=1080&crop=smart&auto=webp&s=5f9c787a80b7daea5e7469ede4494f2c6b133f55);
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: Gothic, sans-serif;
        }
        .con {
            margin: 150px auto;
            background: rgba(255, 255, 255, 0.001);
            backdrop-filter: blur(10px);
            align-items: center;
            text-align: center;
            width: 70%;
        }
        .sub {
            border: solid 1px white;
            border-radius: 15px;
            width: 50%;
            margin: 1% auto;
            padding: 1%;
        }
        .avatar {
            width: 90px;
            padding: 5%;
        }
        .bubble {
            width: 70%;
            font-size: 1.5em;
            color: white;
        }
        .subcon {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5%;
        }
        .header {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="con">
        <div class="header">
            <div class="avatar"><img src="https://preview.redd.it/which-pic-to-set-as-a-pfp-v0-k9bmnxdeh28e1.jpg?width=1080&crop=smart&auto=webp&s=8cc56d4638874cc8336d8072f0d300cb95c0b286" alt="lain" width="90px" style="border-radius: 50%;"></div>
            <div class="bubble">welcome to the wired. choose a subject to start the quiz</div>
        </div>
        <div class="subcon">
            <div class="sub">OS</div>
            <div class="sub">DSA</div>
            <div class="sub">PYTHON</div>
            <div class="sub">JAVA</div>
            <div class="sub">PHYSICS</div>
        </div>
    </div>

</html>
