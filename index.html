<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <title>Revise With Lain</title>
    <style>
        body {
            background-image: url(https://i.pinimg.com/originals/f0/83/f6/f083f63dfcf3bde7060e4e007311f67f.gif);
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: Gothic, sans-serif;
        }
        .con {
            margin: 150px auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(3px);
            align-items: center;
            text-align: center;
            width: 70%;
            border-radius: 15px;
        }
        .sub {
            border: solid 1px white;
            border-radius: 15px;
            width: 50%;
            margin: 1% auto;
            padding: 1%;
        }
        a{
            color: white;
            text-decoration: none;
        }
        .sub:hover{
            background: rgba(0, 0, 0, 0.5);
            color: white;
            cursor: pointer;
            transform: scale(1.03);
            transition: 0.3s;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3); 
        }                      
        .avatar img:hover{
            transform: scale(1.1);
            transition: 0.3s;
            
        }
        .avatar{
            margin: 25%;
            border-radius:50%;
            width: 130px;
            height: 130px;
            
            object-fit: cover;
        }
        .bubble {
            width: 70%;
            font-size: 1.5em;
            color: white;
        }
        .subcon {
            
            align-items: center;
            padding: 5%;
        }
        .header {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px 15px 0 0;
            font-family: 'Special Elite', system-ui;
        }
    </style>
</head>
